# =====================================================
# AUTO
# =====================================================

auto.selectByFilter=select a from Auto a \
left join a.veicolo v \
left join v.colore col \
left join v.categoria cat \
left join v.tipoAlimentazione alim \
where (:id is null or a.idAuto = :id) \
and (:targa is null or a.targa like :targa%) \
and (:marca is null or v.marca like :marca%) \
and (:modello is null or v.modello like :modello%) \
and (:colore is null or col.id = :colore) \
and (:categoria is null or cat.id = :categoria)

auto.getByTarga=select a from Auto a \
where a.targa = :targa

auto.getByTargaLikeA=select a from Auto a \
where a.targa like 'A%'



