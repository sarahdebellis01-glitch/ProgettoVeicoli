# =====================================================
# BICI
# =====================================================

bici.selectByFilter=select b from Bici b \
left join b.veicolo v \
left join v.colore col \
left join v.categoria cat \
where (:id is null or b.idBici = :id) \
and (:marca is null or v.marca like :marca%) \
and (:modello is null or v.modello like :modello%) \
and (:colore is null or col.id = :colore) \
and (:categoria is null or cat.id = :categoria) \
and (:pieghevole is null or b.pieghevole = :pieghevole)

bici.getByMarcaLikeA=select b from Bici b \
join b.veicolo v \
where v.marca like 'A%'



# =====================================================
# VEICOLI
# =====================================================

veicoli.selectByFilter=select v from Veicoli v \
left join v.colore col \
left join v.categoria cat \
left join v.tipoAlimentazione alim \
where (:id is null or v.idVeicoli = :id) \
and (:tipoVeicolo is null or v.tipoVeicolo like :tipoVeicolo%) \
and (:marca is null or v.marca like :marca%) \
and (:modello is null or v.modello like :modello%) \
and (:colore is null or col.id = :colore) \
and (:categoria is null or cat.id = :categoria) \
and (:alimentazione is null or alim.id = :alimentazione)

veicoli.getByMarcaLikeA=select v from Veicoli v \
where v.marca like 'A%'